name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REPO: helliott20/dmarc-analyser

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate database migrations
        run: |
          rm -rf drizzle/*.sql drizzle/meta
          npx drizzle-kit generate
          if [ -z "$(ls -A drizzle/*.sql 2>/dev/null)" ]; then
            echo "ERROR: Failed to generate migration."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "has_version=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.REPO }}:web
            ${{ steps.meta.outputs.has_version == 'true' && format('{0}:web-{1}', env.REPO, steps.meta.outputs.version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: true
          tags: |
            ${{ env.REPO }}:worker
            ${{ steps.meta.outputs.has_version == 'true' && format('{0}:worker-{1}', env.REPO, steps.meta.outputs.version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
